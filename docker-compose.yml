services:
  postgres:
    image: postgres:16-alpine
    container_name: tiktokshop_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tiktokshop_dev}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tiktokshop_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: src/TikTokShop.Api/Dockerfile
    container_name: tiktokshop_backend
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-tiktokshop_dev};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      Jwt__SecretKey: ${JWT_SECRET_KEY:-CHANGE_THIS_TO_A_RANDOM_SECRET_KEY_AT_LEAST_64_CHARS_LONG_FOR_PRODUCTION}
      Jwt__Issuer: ${JWT_ISSUER:-TikTokShop}
      Jwt__Audience: ${JWT_AUDIENCE:-TikTokShopClient}
      Jwt__AccessTokenMinutes: ${JWT_ACCESS_TOKEN_MINUTES:-60}
      Jwt__RefreshTokenDays: ${JWT_REFRESH_TOKEN_DAYS:-7}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_logs:/app/logs
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tiktokshop_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@tiktokshop.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - postgres
    profiles:
      - tools
    restart: unless-stopped

volumes:
  postgres_data:
  backend_logs:
